<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>CS2 Director - Tactical Radar Replay</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="control-panel app-toolbar">
    <h2>CS2 Director Demo Player</h2>
    <div class="actions">
      <button id="btn-back-home" class="is-hidden" type="button">Back To Home</button>
      <button id="btn-open" type="button">Import Demo (.dem)</button>
      <button id="btn-parse-db" type="button" disabled>Parse &amp; Save To DB</button>
      <span id="status-text">Ready. Waiting for demo import...</span>
    </div>
  </div>

  <div id="home-view" class="view">
    <aside class="library-panel home-library-panel">
      <div class="library-header">
        <h3>Stored Demos</h3>
        <button id="btn-refresh-demos" type="button">Refresh</button>
      </div>
      <div id="demo-list" class="demo-list">
        <div class="demo-empty">No demos in database</div>
      </div>
      <div id="parse-job-progress" class="parse-job-progress is-hidden">
        <div class="parse-job-header">
          <span id="parse-job-text">Idle</span>
          <span id="parse-job-percent">0%</span>
        </div>
        <div class="parse-job-bar">
          <div id="parse-job-bar-fill" class="parse-job-bar-fill"></div>
        </div>
        <div id="parse-job-meta" class="parse-job-meta">Waiting...</div>
      </div>
    </aside>
  </div>

  <div id="replay-view" class="view is-hidden">
    <div class="replay-header">
      <h3 id="replay-title">Replay</h3>
    </div>
    <div class="replay-layout">
      <div class="canvas-container replay-canvas">
        <canvas id="radar-canvas" width="1600" height="900"></canvas>
      </div>
      <aside class="rounds-panel">
        <h3>Rounds</h3>
        <div id="round-list" class="round-list">
          <div class="round-empty">No rounds</div>
        </div>
      </aside>
    </div>

    <div class="control-panel replay-controls">
      <div class="actions replay-actions">
        <button id="btn-play-toggle" type="button" disabled>Play</button>
        <input id="progress-bar" type="range" min="0" max="0" value="0" step="1" disabled>
        <span id="progress-text">0/0</span>
      </div>
    </div>
  </div>

  <div id="demo-context-menu" class="demo-context-menu is-hidden" role="menu" aria-label="Demo actions">
    <button id="demo-context-rename" class="demo-context-item" type="button" role="menuitem">Rename</button>
    <button id="demo-context-delete" class="demo-context-item danger" type="button" role="menuitem">Delete</button>
  </div>

  <script src="js/ui/core.js"></script>
  <script src="js/ui/weapon-icons.js"></script>
  <script src="js/ui/round-playback-utils.js"></script>
  <script src="js/ui/team-panel-header-utils.js"></script>
  <script src="js/ui/hud-slot-layout-utils.js"></script>
  <script src="js/ui/library.js"></script>
  <script src="js/ui/hud.js"></script>
  <script src="js/ui/grenade-visual-utils.js"></script>
  <script src="js/ui/rendering.js"></script>
  <script src="js/ui/events.js"></script>
</body>
</html>
